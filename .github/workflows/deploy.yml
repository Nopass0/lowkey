name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_HOST: 89.169.54.87
  SERVER_USER: root
  DEPLOY_DIR: /opt/lowkey

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Stop and remove old deployment
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} '
            if [ -d /opt/lowkey ]; then
              cd /opt/lowkey
              docker compose down --remove-orphans 2>/dev/null || true
            fi
            rm -rf /opt/lowkey
            mkdir -p /opt/lowkey
            echo "Old deployment removed"
          '

      - name: Clone fresh code
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
            'git clone --depth=1 https://github.com/Nopass0/lowkey.git /opt/lowkey && echo "Clone OK"'

      - name: Write .env file on server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          VPN_PSK: ${{ secrets.VPN_PSK }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          TOCHKA_JWT: ${{ secrets.TOCHKA_JWT }}
          TOCHKA_MERCHANT_ID: ${{ secrets.TOCHKA_MERCHANT_ID }}
          TOCHKA_LEGAL_ID: ${{ secrets.TOCHKA_LEGAL_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_ADMIN_CHAT_ID: ${{ secrets.TG_ADMIN_CHAT_ID }}
        run: |
          cat > /tmp/deploy.env << EOF
          DATABASE_URL=${DATABASE_URL}
          JWT_SECRET=${JWT_SECRET}
          VPN_PSK=${VPN_PSK}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          API_PORT=8080
          UDP_PORT=51820
          PROXY_PORT=8388
          NEXT_PUBLIC_API_URL=http://${{ env.SERVER_HOST }}:8080
          TOCHKA_JWT=${TOCHKA_JWT}
          TOCHKA_MERCHANT_ID=${TOCHKA_MERCHANT_ID}
          TOCHKA_LEGAL_ID=${TOCHKA_LEGAL_ID}
          TG_BOT_TOKEN=${TG_BOT_TOKEN}
          TG_ADMIN_CHAT_ID=${TG_ADMIN_CHAT_ID}
          EOF
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no \
            /tmp/deploy.env \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:/opt/lowkey/.env
          echo ".env written to server"

      - name: Ensure Docker and docker-compose-plugin are available
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} '
            set -e
            if command -v docker &>/dev/null; then
              echo "Docker already installed: $(docker --version)"
            else
              echo "Installing Docker..."
              apt-get update -q
              apt-get install -y ca-certificates curl gnupg lsb-release
              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
              apt-get update -q
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              systemctl enable --now docker
              echo "Docker installed: $(docker --version)"
            fi
            if ! docker compose version &>/dev/null; then
              apt-get install -y docker-compose-plugin 2>/dev/null || true
            fi
            echo "docker compose: $(docker compose version)"
          '

      - name: Build and start Docker Compose services
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} '
            set -e
            cd /opt/lowkey

            echo "=== Verifying deployed commit ==="
            git log --oneline -3

            echo "=== Cargo.toml workspace members ==="
            cat Cargo.toml

            echo "=== Checking for vpn-desktop in workspace (should be absent) ==="
            if grep -q "vpn-desktop" Cargo.toml; then
              echo "ERROR: vpn-desktop still in workspace! Running git reset --hard..."
              git fetch origin main
              git reset --hard origin/main
              echo "After reset:"
              cat Cargo.toml
            else
              echo "OK: vpn-desktop NOT in workspace"
            fi

            echo "=== Cleaning Docker state ==="
            docker system prune -af 2>/dev/null || true

            echo "=== Docker build context size check ==="
            du -sh vpn-common vpn-server vpn-client Cargo.toml Cargo.lock 2>/dev/null || true

            echo "=== Building (BUILDKIT progress=plain) ==="
            DOCKER_BUILDKIT=1 BUILDKIT_PROGRESS=plain docker compose build --no-cache 2>&1 | tail -100

            echo "=== Starting services ==="
            docker compose up -d --remove-orphans
            echo "=== Done ==="
          '

      - name: Wait for services and verify
        run: |
          echo "Waiting 30s for services to start..."
          sleep 30

          echo "=== Docker service status ==="
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
            'cd /opt/lowkey && docker compose ps'

          echo "=== API health check ==="
          API_OK=false
          for i in $(seq 1 12); do
            if curl -sf "http://${{ env.SERVER_HOST }}:8080/subscription/plans" > /dev/null 2>&1; then
              echo "API is up at http://${{ env.SERVER_HOST }}:8080"
              API_OK=true
              break
            fi
            echo "Attempt $i/12: waiting 5s..."
            sleep 5
          done

          echo "=== Web health check ==="
          WEB_OK=false
          for i in $(seq 1 12); do
            if curl -sf "http://${{ env.SERVER_HOST }}:3000" > /dev/null 2>&1; then
              echo "Web is up at http://${{ env.SERVER_HOST }}:3000"
              WEB_OK=true
              break
            fi
            echo "Attempt $i/12: waiting 5s..."
            sleep 5
          done

          echo ""
          echo "=== Server logs (last 30 lines) ==="
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} \
            'cd /opt/lowkey && docker compose ps && echo "" && docker compose logs --tail=30 2>/dev/null | tail -30'

          echo ""
          echo "API: http://${{ env.SERVER_HOST }}:8080"
          echo "Web: http://${{ env.SERVER_HOST }}:3000"
          $API_OK && $WEB_OK && echo "Deployment successful!" || echo "Warning: services may need more time — check logs above"
